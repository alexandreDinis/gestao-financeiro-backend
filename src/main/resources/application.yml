spring:
  application:
    name: gestao-financeiro

  # Configuração conectando no PostgreSQL (via variável de ambiente)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:financeiro}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Flyway também usará as mesmas credenciais do datasource

server:
  port: 8080

app:
  jwt:
    # default secret (base64) so it won't crash if the variable is missing
    secret: ${JWT_SECRET:YmVzdF9zZWNyZXRfa2V5X2Zvcl9nZXN0YW9fZmluYW5jZWlyb18yMDI2X2FwaV90b2tlbg==}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
